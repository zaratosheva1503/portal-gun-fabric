plugins {
	id 'fabric-loom' version '1.6-SNAPSHOT'
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	maven { url "https://api.modrinth.com/maven" }   // Immersive Portals
	maven { url "https://maven.fabricmc.net/" }
	maven { url "https://maven.terraformersmc.com/" } // ModMenu (optional)
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// Immersive Portals for 1.20.1 Fabric.
	// IMPORTANT: replace the version below with a real tag from
	// https://modrinth.com/mod/immersive-portals/versions (filter: 1.20.1, Fabric)
	// -> open a version -> copy the Gradle (Modrinth Maven) coordinate.
	modImplementation "maven.modrinth:immersive-portals:v5.0.1-mc1.20.1-fabric"
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
	withSourcesJar()
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.archives_base_name}" }
	}
}
